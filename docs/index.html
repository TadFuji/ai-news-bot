<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ニュース TOP10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="alternate" type="application/rss+xml" title="AI ニュース TOP10" href="feed.xml">
    <!-- OGP_START --><!-- OGP_END -->
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #22d3ee;
            --border: rgba(148, 163, 184, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .update-time {
            display: inline-block;
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            color: var(--accent);
            margin-top: 1rem;
            border: 1px solid var(--border);
        }

        .nav {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav a:hover,
        .nav a.active {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .news-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .news-rank {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            text-align: center;
            line-height: 2rem;
            font-weight: 700;
            font-size: 0.9rem;
            margin-right: 0.75rem;
        }

        .news-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text);
            display: inline;
        }

        .news-category {
            display: inline-block;
            padding: 0.1rem 0.6rem;
            border-radius: 0.25rem;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent);
            border: 1px solid rgba(34, 211, 238, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .news-summary {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.8;
            margin-top: 0.5rem;
        }

        .news-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
        }

        .news-source {
            color: var(--accent);
        }

        .news-link a {
            color: var(--primary);
            text-decoration: none;
        }

        .news-link a:hover {
            text-decoration: underline;
        }

        /* --- 編集長の一言（テーマバナー） --- */
        .today-theme {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.18), rgba(34, 211, 238, 0.1));
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: 1rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
        }

        .today-theme .theme-label {
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.08em;
            margin-bottom: 0.35rem;
        }

        .today-theme .theme-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .today-theme .theme-comment {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* --- カテゴリフィルター --- */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .filter-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.35rem 0.9rem;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            color: var(--text);
        }

        .filter-btn.active {
            color: white;
            background: var(--primary);
            border-color: var(--primary);
        }

        /* --- 記事カード内の付加情報（So What） --- */
        .news-oneliner {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--accent);
            margin: 0.25rem 0 0.5rem;
        }

        .news-why {
            font-size: 0.9rem;
            color: var(--text-muted);
            background: rgba(99, 102, 241, 0.08);
            border-radius: 0.5rem;
            padding: 0.6rem 0.8rem;
            margin: 0.75rem 0;
        }

        .news-action {
            font-size: 0.9rem;
            color: var(--text);
            border-left: 3px solid var(--accent);
            padding: 0.4rem 0 0.4rem 0.8rem;
            margin: 0.75rem 0;
        }

        /* --- カテゴリ色分け（7トラック） --- */
        .news-category[data-category="対話型AI"] {
            background: rgba(167, 139, 250, 0.18);
            color: #c4b5fd;
            border-color: rgba(167, 139, 250, 0.4);
        }

        .news-category[data-category="画像・動画AI"] {
            background: rgba(244, 114, 182, 0.18);
            color: #f9a8d4;
            border-color: rgba(244, 114, 182, 0.4);
        }

        .news-category[data-category="中国AI"] {
            background: rgba(251, 113, 133, 0.18);
            color: #fda4af;
            border-color: rgba(251, 113, 133, 0.4);
        }

        .news-category[data-category="ビジネス活用"] {
            background: rgba(52, 211, 153, 0.18);
            color: #6ee7b7;
            border-color: rgba(52, 211, 153, 0.4);
        }

        .news-category[data-category="リスク・規制"] {
            background: rgba(251, 191, 36, 0.18);
            color: #fcd34d;
            border-color: rgba(251, 191, 36, 0.4);
        }

        .news-category[data-category="日本市場"] {
            background: rgba(96, 165, 250, 0.18);
            color: #93c5fd;
            border-color: rgba(96, 165, 250, 0.4);
        }

        .news-category[data-category="研究・技術"] {
            background: rgba(34, 211, 238, 0.18);
            color: #67e8f9;
            border-color: rgba(34, 211, 238, 0.4);
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .news-card {
                padding: 1rem;
            }

            .container {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <header>
            <h1>🤖 AI ニュース TOP10</h1>
            <p class="subtitle">過去24時間のAI関連ニュースを厳選してお届け</p>
            <span class="update-time" id="update-time">読み込み中...</span>
        </header>

        <nav class="nav">
            <a href="index.html" class="active">最新（国内）</a>
            <a href="global.html">🌐 グローバル速報</a>
            <a href="column.html">コラム</a>
            <a href="archive.html">アーカイブ</a>
        </nav>

        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="対話型AI">対話型AI</button>
            <button class="filter-btn" data-filter="画像・動画AI">画像・動画AI</button>
            <button class="filter-btn" data-filter="中国AI">中国AI</button>
            <button class="filter-btn" data-filter="ビジネス活用">ビジネス活用</button>
            <button class="filter-btn" data-filter="リスク・規制">リスク・規制</button>
            <button class="filter-btn" data-filter="日本市場">日本市場</button>
            <button class="filter-btn" data-filter="研究・技術">研究・技術</button>
        </div>

        <section id="today-theme"></section>

        <main id="news-container">
            <!-- PRERENDER_START --><!-- PRERENDER_END -->
        </main>

        <footer>
            <p>Powered by <a href="https://github.com/TadFuji/ai-news-bot">AI News Bot</a> |
                データソース: TechCrunch, The Verge, Wired, NHK 他</p>
        </footer>
    </div>

    <script>
        // HTMLエスケープ（テキストフィールドを安全に挿入する）
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // 最新のニュースファイルを読み込む
        async function loadNews() {
            try {
                // URLパラメータからjsonファイル名を取得
                const params = new URLSearchParams(window.location.search);
                const jsonFile = params.get('json') || 'latest.json';

                const response = await fetch(jsonFile);
                const data = await response.json();

                document.getElementById('update-time').textContent =
                    `更新: ${data.updated || ''}`;

                // 編集長の一言（テーマ + コメント）をリスト上部に表示
                const themeEl = document.getElementById('today-theme');
                if (data.theme || data.morning_comment) {
                    themeEl.className = 'today-theme';
                    themeEl.innerHTML = `
                        <div class="theme-label">☀️ 今日のテーマ</div>
                        ${data.theme ? `<div class="theme-title">${esc(data.theme)}</div>` : ''}
                        ${data.morning_comment ? `<div class="theme-comment">${esc(data.morning_comment)}</div>` : ''}
                    `;
                } else {
                    themeEl.className = '';
                    themeEl.innerHTML = '';
                }

                const container = document.getElementById('news-container');
                container.innerHTML = data.articles.map((article, i) => {
                    const category = article.category || '未分類';

                    return `
                    <article class="news-card" data-category="${esc(category)}">
                        <div style="display: flex; flex-direction: column;">
                            <div style="display: flex; align-items: center; margin-bottom: 5px;">
                                <span class="news-rank">${i + 1}</span>
                                <span class="news-category" data-category="${esc(category)}">${esc(category)}</span>
                            </div>
                            ${article.one_liner ? `<div class="news-oneliner">💡 ${esc(article.one_liner)}</div>` : ''}
                            <h2 class="news-title">${esc(article.title)}</h2>
                        </div>
                        <p class="news-summary">${esc(article.summary)}</p>
                        ${article.why_important ? `<div class="news-why">📌 なぜ重要？ ${esc(article.why_important)}</div>` : ''}
                        ${article.action_item ? `<div class="news-action">👉 今日の行動：${esc(article.action_item)}</div>` : ''}
                        <div class="news-meta">
                            <span class="news-source">📰 ${esc(article.source)}</span>
                            <span class="news-link"><a href="${esc(article.url)}" target="_blank" rel="noopener">→ 元記事を読む</a></span>
                        </div>
                    </article>
                `}).join('');

                setupFilters();
            } catch (e) {
                document.getElementById('news-container').innerHTML =
                    '<p style="text-align:center;color:var(--text-muted);">ニュースを読み込み中...</p>';
            }
        }

        // カテゴリ絞り込み（純JS・data-category で表示切替）
        function setupFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const f = btn.getAttribute('data-filter');
                    document.querySelectorAll('.news-card').forEach(card => {
                        const match = (f === 'all') || (card.getAttribute('data-category') === f);
                        card.style.display = match ? '' : 'none';
                    });
                });
            });
        }

        loadNews();
    </script>
</body>

</html>
