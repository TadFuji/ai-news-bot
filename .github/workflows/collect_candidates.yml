name: "Stage 1: Collect Candidates"

on:
  # 自動実行は停止（2026-06-29）。
  # 理由: Stage 1 が集めた候補は output/ が .gitignore 対象のため別ジョブの
  # Stage 2 へ引き継がれず、Stage 2 が 07:00 に自前で再収集していた。毎朝の
  # Gemini 1 回分・実行時間が無駄になっていたため、毎日 03:00 の自動起動を止める。
  # 配信(Stage 2 / Morning Brief)には影響しない。手動実行は下の workflow_dispatch で可能。
  # 元に戻す場合は、下の schedule 2 行のコメントを解除する。
  #   schedule:
  #     - cron: '0 18 * * *'  # 18:00 UTC = 03:00 JST
  workflow_dispatch:

permissions:
  contents: write

# schedule と手動実行が重なっても二重配信・DB競合を防ぐ（実行中は中断しない）
concurrency:
  group: collect-candidates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements-ci.txt

    - name: "Run Stage 1: RSS Collection + Gemini 1st Pass"
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        python collect_rss_gemini.py

    - name: Commit candidates
      uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
      with:
        commit_message: "Stage 1: Candidates collected [skip ci]"
        branch: main
