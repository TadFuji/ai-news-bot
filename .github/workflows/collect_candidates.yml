name: "Stage 1: Collect Candidates"

on:
  schedule:
    # 18:00 UTC = 03:00 JST
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

# schedule と手動実行が重なっても二重配信・DB競合を防ぐ（実行中は中断しない）
concurrency:
  group: collect-candidates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements-ci.txt

    - name: "Run Stage 1: RSS Collection + Gemini 1st Pass"
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        python collect_rss_gemini.py

    - name: Commit candidates
      uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
      with:
        commit_message: "Stage 1: Candidates collected [skip ci]"
        branch: main
