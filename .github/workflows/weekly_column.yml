name: Weekly AI Column

on:
  schedule:
    - cron: '0 0 * * 0'  # UTC Sunday 00:00 = JST Sunday 09:00
  workflow_dispatch:

permissions:
  contents: write

# schedule と手動実行が重なっても二重配信を防ぐ（実行中は中断しない）
concurrency:
  group: weekly-column-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-weekly-column:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        # Weekly Column に必要な最小限の依存（バージョン固定ファイルで管理）
        pip install -r requirements-weekly.txt

    - name: Run Weekly Generator
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        python generate_weekly_column.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
      with:
        commit_message: "Weekly Column Output [skip ci]"
        branch: main
