name: "Stage 2: Morning Brief Delivery"

on:
  schedule:
    # 22:00 UTC = 07:00 JST
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

# schedule と手動実行が重なっても二重配信・DB競合を防ぐ（実行中は中断しない）
concurrency:
  group: morning-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  morning-brief:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements-ci.txt

    - name: Install Japanese fonts (for OGP image card)
      run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

    - name: "Run Stage 2: Curate + Distribute"
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
        X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
        X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
        X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        X_THREAD_MODE: ${{ vars.X_THREAD_MODE }}
        NOTO_JP_FONT: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      run: |
        python curate_morning_brief.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
      with:
        commit_message: "Morning Brief delivered [skip ci]"
        branch: main
