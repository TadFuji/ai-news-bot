name: "Stage 2: Morning Brief Delivery"

on:
  schedule:
    # 22:00 UTC = 07:00 JST
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

# schedule と手動実行が重なっても二重配信・DB競合を防ぐ（実行中は中断しない）
concurrency:
  group: morning-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  morning-brief:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements-ci.txt

    - name: Install Japanese fonts (for OGP image card)
      run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

    - name: "Run Stage 2: Curate + Distribute"
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
        X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
        X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
        X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        X_THREAD_MODE: ${{ vars.X_THREAD_MODE }}
        NOTO_JP_FONT: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      run: |
        python curate_morning_brief.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
      with:
        commit_message: "Morning Brief delivered [skip ci]"
        branch: main
