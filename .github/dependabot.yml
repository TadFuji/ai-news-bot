version: 2
updates:
  # Python dependencies (requirements*.txt) — bundled into a single weekly PR
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-dependencies:
        patterns:
          - "*"

  # GitHub Actions versions — bundled into a single weekly PR
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      # 日次コミットに使う action の大型(major)更新は見送る（本番コミット部分は
      # lint/tests では検証されないため）。minor/patch と他actionの更新は受け取る。
      - dependency-name: "stefanzweifel/git-auto-commit-action"
        update-types: ["version-update:semver-major"]
